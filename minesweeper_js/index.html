<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ SUBSYSTEM: MINESWEEPER ]</title>
    <style>
        :root {
            --bg-color: #030303;
            --accent: #00ff41;
            --pink-glitch: #ff00c1;
            --dark-gray: #1a1a1a;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Scanline efekti sitenle uyumlu olsun */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 9999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .game-title {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            margin-bottom: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* Klasik mayın tarlası çerçevesi ama cyberpunk stilde */
        .minesweeper-window {
            background: #111;
            border: 2px solid var(--border-color);
            padding: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            border: 1px solid var(--border-color);
            padding: 10px;
            margin-bottom: 15px;
        }

        .digit-display {
            color: var(--pink-glitch);
            font-size: 1.5rem;
            font-weight: bold;
            background: #050505;
            padding: 2px 8px;
            border: 1px solid #222;
            min-width: 60px;
            text-align: center;
        }

        .face-btn {
            background: var(--dark-gray);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 1.2rem;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
        }

        .face-btn:hover {
            background: var(--accent);
            color: #000;
        }

        /* Oyun Izgarası */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(10, 30px);
            gap: 2px;
            background: var(--dark-gray);
            padding: 2px;
            border: 1px solid var(--border-color);
        }

        .cell {
            width: 30px;
            height: 30px;
            background: #252525;
            border: 1px solid #151515;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
        }

        .cell:hover {
            background: #333;
        }

        .cell.revealed {
            background: #0a0a0a;
            border: 1px solid #111;
            cursor: default;
        }

        /* Sayıların siber renkleri */
        .cell[data-count="1"] { color: #00e5ff; }
        .cell[data-count="2"] { color: var(--accent); }
        .cell[data-count="3"] { color: var(--pink-glitch); }
        .cell[data-count="4"] { color: #ffff00; }
        .cell.mine {
            background: #ff0055;
            color: #000;
        }
        .cell.flagged {
            color: var(--pink-glitch);
        }
    </style>
</head>
<body>

    <div class="game-title">[ TERMINAL.EXE // MINESWEEPER ]</div>

    <div class="minesweeper-window">
        <div class="scoreboard">
            <div id="mine-count" class="digit-display">010</div>
            <button id="restart-btn" class="face-btn">:-)</button>
            <div id="timer" class="digit-display">000</div>
        </div>
        <div id="grid"></div>
    </div>

    <script>
        const rows = 10;
        const cols = 10;
        const minesCount = 12;
        let grid = [];
        let gameOver = false;
        let timerInterval = null;
        let timeElapsed = 0;
        let timerStarted = false;

        const gridElement = document.getElementById('grid');
        const mineCountElement = document.getElementById('mine-count');
        const timerElement = document.getElementById('timer');
        const restartBtn = document.getElementById('restart-btn');

        function initGame() {
            gridElement.innerHTML = '';
            grid = [];
            gameOver = false;
            timeElapsed = 0;
            timerStarted = false;
            clearInterval(timerInterval);
            timerElement.innerText = "000";
            mineCountElement.innerText = String(minesCount).padStart(3, '0');
            restartBtn.innerText = ":-)";

            // Matris oluştur
            for (let r = 0; r < rows; r++) {
                grid[r] = [];
                for (let c = 0; c < cols; c++) {
                    const cellElement = document.createElement('div');
                    cellElement.classList.add('cell');
                    cellElement.dataset.row = r;
                    cellElement.dataset.col = c;
                    
                    cellElement.addEventListener('click', () => clickCell(r, c));
                    cellElement.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        flagCell(r, c);
                    });

                    gridElement.appendChild(cellElement);
                    grid[r][c] = {
                        mine: false,
                        revealed: false,
                        flagged: false,
                        count: 0,
                        element: cellElement
                    };
                }
            }

            // Mayınları yerleştir
            let placedMines = 0;
            while (placedMines < minesCount) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                if (!grid[r][c].mine) {
                    grid[r][c].mine = true;
                    placedMines++;
                }
            }

            // Çevre sayılarını hesapla
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c].mine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (r+dr >= 0 && r+dr < rows && c+dc >= 0 && c+dc < cols) {
                                if (grid[r+dr][c+dc].mine) count++;
                            }
                        }
                    }
                    grid[r][c].count = count;
                }
            }
        }

        function startTimer() {
            timerStarted = true;
            timerInterval = setInterval(() => {
                timeElapsed++;
                timerElement.innerText = String(timeElapsed).padStart(3, '0');
                if (timeElapsed >= 999) clearInterval(timerInterval);
            }, 1000);
        }

        function clickCell(r, c) {
            if (gameOver || grid[r][c].revealed || grid[r][c].flagged) return;
            if (!timerStarted) startTimer();

            const cell = grid[r][c];
            cell.revealed = true;
            cell.element.classList.add('revealed');

            if (cell.mine) {
                endGame(false);
                return;
            }

            if (cell.count > 0) {
                cell.element.innerText = cell.count;
                cell.element.setAttribute('data-count', cell.count);
            } else {
                // Boş hücre ise etrafı otomatik aç (Flood Fill)
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (r+dr >= 0 && r+dr < rows && c+dc >= 0 && c+dc < cols) {
                            clickCell(r+dr, c+dc);
                        }
                    }
                }
            }

            checkWin();
        }

        function flagCell(r, c) {
            if (gameOver || grid[r][c].revealed) return;
            const cell = grid[r][c];
            cell.flagged = !cell.flagged;
            
            if (cell.flagged) {
                cell.element.classList.add('flagged');
                cell.element.innerText = 'P';
            } else {
                cell.element.classList.remove('flagged');
                cell.element.innerText = '';
            }
        }

        function endGame(isWin) {
            gameOver = true;
            clearInterval(timerInterval);
            restartBtn.innerText = isWin ? "B-)" : "X-(";

            // Tüm mayınları göster
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c].mine) {
                        grid[r][c].element.classList.add('mine');
                        grid[r][c].element.innerText = 'X';
                    }
                }
            }
        }

        function checkWin() {
            let win = true;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!grid[r][c].mine && !grid[r][c].revealed) win = false;
                }
            }
            if (win) endGame(true);
        }

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
