<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ SUBSYSTEM: MINESWEEPER ]</title>
    <style>
        :root {
            --bg-color: #030303;
            --accent: #00ff41;
            --pink-glitch: #ff00c1;
            --dark-gray: #111;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 9999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .game-title {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
            margin-bottom: 15px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        /* Responsive Window Box */
        .minesweeper-window {
            background: #080808;
            border: 2px solid var(--border-color);
            padding: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
            max-width: 100%;
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            border: 1px solid var(--border-color);
            padding: 10px;
            margin-bottom: 15px;
        }

        .digit-display {
            color: var(--pink-glitch);
            font-size: 1.4rem;
            font-weight: bold;
            background: #020202;
            padding: 4px 8px;
            border: 1px solid #222;
            min-width: 60px;
            text-align: center;
        }

        .face-btn {
            background: #1a1a1a;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 1.1rem;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }

        /* MOBIL MOD SECICI BUTON */
        .mode-control {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .mode-btn {
            background: #1a1a1a;
            border: 1px solid var(--pink-glitch);
            color: var(--pink-glitch);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 280px;
            text-align: center;
        }

        .mode-btn.flag-active {
            background: var(--pink-glitch);
            color: #000;
            box-shadow: 0 0 10px var(--pink-glitch);
        }

        /* Grid - Flex/Responsive layout logic */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(10, 30px);
            gap: 2px;
            background: #1f1f1f;
            padding: 2px;
            border: 1px solid var(--border-color);
            justify-content: center;
        }

        /* Cells optimized for touch screens (30x30px minimum hit target) */
        .cell {
            width: 30px;
            height: 30px;
            background: #282828;
            border: 1px solid #1c1c1c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .cell.revealed {
            background: #050505;
            border: 1px solid #111;
            cursor: default;
        }

        /* Cyberpunk Proximity Colors */
        .cell[data-count="1"] { color: #00e5ff; }
        .cell[data-count="2"] { color: var(--accent); }
        .cell[data-count="3"] { color: var(--pink-glitch); }
        .cell[data-count="4"] { color: #ffea00; }
        
        .cell.mine {
            background: #ff0055 !important;
            color: #000 !important;
        }
        
        .cell.flagged {
            color: var(--pink-glitch) !important;
        }

        /* Sıkışma önleyici küçük ekran optimizasyonu */
        @media (max-width: 360px) {
            #grid {
                grid-template-columns: repeat(10, 26px);
                grid-template-rows: repeat(10, 26px);
            }
            .cell {
                width: 26px;
                height: 26px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="game-title">[ TERMINAL.EXE // MINESWEEPER_MOBILE ]</div>

    <div class="minesweeper-window">
        <div class="mode-control">
            <button id="mode-toggle-btn" class="mode-btn">MODE: DIGGING [⛏️]</button>
        </div>

        <div class="scoreboard">
            <div id="mine-count" class="digit-display">012</div>
            <button id="restart-btn" class="face-btn">:-)</button>
            <div id="timer" class="digit-display">000</div>
        </div>
        <div id="grid"></div>
    </div>

    <script>
        const rows = 10;
        const cols = 10;
        const minesCount = 12;
        let grid = [];
        let gameOver = false;
        let timerInterval = null;
        let timeElapsed = 0;
        let timerStarted = false;
        
        // Mobil mod kontrolü: false = Kazma/Açma modifikasyonu, true = İşaretleme/Bayrak modifikasyonu
        let isFlagMode = false; 

        const gridElement = document.getElementById('grid');
        const mineCountElement = document.getElementById('mine-count');
        const timerElement = document.getElementById('timer');
        const restartBtn = document.getElementById('restart-btn');
        const modeToggleBtn = document.getElementById('mode-toggle-btn');

        // Mod değiştirici tıklama olayı
        modeToggleBtn.addEventListener('click', () => {
            isFlagMode = !isFlagMode;
            if (isFlagMode) {
                modeToggleBtn.classList.add('flag-active');
                modeToggleBtn.innerText = "MODE: FLAGGING [🚩]";
            } else {
                modeToggleBtn.classList.remove('flag-active');
                modeToggleBtn.innerText = "MODE: DIGGING [⛏️]";
            }
        });

        function initGame() {
            gridElement.innerHTML = '';
            grid = [];
            gameOver = false;
            timeElapsed = 0;
            timerStarted = false;
            isFlagMode = false;
            modeToggleBtn.classList.remove('flag-active');
            modeToggleBtn.innerText = "MODE: DIGGING [⛏️]";
            clearInterval(timerInterval);
            timerElement.innerText = "000";
            mineCountElement.innerText = String(minesCount).padStart(3, '0');
            restartBtn.innerText = ":-)";

            for (let r = 0; r < rows; r++) {
                grid[r] = [];
                for (let c = 0; c < cols; c++) {
                    const cellElement = document.createElement('div');
                    cellElement.classList.add('cell');
                    
                    // Ana tıklama mekanizması (Dokunmatik ekran dostu)
                    cellElement.addEventListener('click', () => handleCellClick(r, c));
                    
                    // Masaüstü için sağ tık fonksiyonu hala aktif kalsın
                    cellElement.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        flagCell(r, c);
                    });

                    gridElement.appendChild(cellElement);
                    grid[r][c] = {
                        mine: false,
                        revealed: false,
                        flagged: false,
                        count: 0,
                        element: cellElement
                    };
                }
            }

            let placedMines = 0;
            while (placedMines < minesCount) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                if (!grid[r][c].mine) {
                    grid[r][c].mine = true;
                    placedMines++;
                }
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c].mine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (r + dr >= 0 && r + dr < rows && c + dc >= 0 && c + dc < cols) {
                                if (grid[r + dr][c + dc].mine) count++;
                            }
                        }
                    }
                    grid[r][c].count = count;
                }
            }
        }

        function startTimer() {
            timerStarted = true;
            timerInterval = setInterval(() => {
                timeElapsed++;
                timerElement.innerText = String(timeElapsed).padStart(3, '0');
                if (timeElapsed >= 999) clearInterval(timerInterval);
            }, 1000);
        }

        // Mod kontrolüne göre yönlendirme yapan ana fonksiyon
        function handleCellClick(r, c) {
            if (isFlagMode) {
                flagCell(r, c);
            } else {
                revealCell(r, c);
            }
        }

        function revealCell(r, c) {
            if (gameOver || grid[r][c].revealed || grid[r][c].flagged) return;
            if (!timerStarted) startTimer();

            const cell = grid[r][c];
            cell.revealed = true;
            cell.element.classList.add('revealed');

            if (cell.mine) {
                endGame(false);
                return;
            }

            if (cell.count > 0) {
                cell.element.innerText = cell.count;
                cell.element.setAttribute('data-count', cell.count);
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (r + dr >= 0 && r + dr < rows && c + dc >= 0 && c + dc < cols) {
                            revealCell(r + dr, c + dc);
                        }
                    }
                }
            }
            checkWin();
        }

        function flagCell(r, c) {
            if (gameOver || grid[r][c].revealed) return;
            const cell = grid[r][c];
            cell.flagged = !cell.flagged;
            
            if (cell.flagged) {
                cell.element.classList.add('flagged');
                cell.element.innerText = 'P';
                let currentCount = parseInt(mineCountElement.innerText);
                mineCountElement.innerText = String(Math.max(0, currentCount - 1)).padStart(3, '0');
            } else {
                cell.element.classList.remove('flagged');
                cell.element.innerText = '';
                let currentCount = parseInt(mineCountElement.innerText);
                mineCountElement.innerText = String(currentCount + 1).padStart(3, '0');
            }
        }

        function endGame(isWin) {
            gameOver = true;
            clearInterval(timerInterval);
            restartBtn.innerText = isWin ? "B-)" : "X-(";

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c].mine) {
                        grid[r][c].element.classList.add('mine');
                        grid[r][c].element.innerText = 'X';
                    }
                }
            }
        }

        function checkWin() {
            let win = true;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!grid[r][c].mine && !grid[r][c].revealed) win = false;
                }
            }
            if (win) endGame(true);
        }

        restartBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
