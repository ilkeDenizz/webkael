<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ SUBSYSTEM: MINESWEEPER ]</title>
    <style>
        :root {
            --bg-color: #030303;
            --accent: #00ff41;
            --pink-glitch: #ff00c1;
            --dark-gray: #111;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Scanline Effect - Sitenin ruhu burada da devam etsin */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 9999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .game-title {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
            margin-bottom: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Siber Mayın Tarlası Kabini */
        .minesweeper-window {
            background: #080808;
            border: 2px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
        }

        /* Skor Tablosu */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .digit-display {
            color: var(--pink-glitch);
            font-size: 1.6rem;
            font-family: monospace;
            font-weight: bold;
            background: #020202;
            padding: 4px 10px;
            border: 1px solid #222;
            min-width: 65px;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: inset 0 0 5px #000;
        }

        .face-btn {
            background: #1a1a1a;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 1.2rem;
            padding: 6px 12px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .face-btn:hover {
            background: var(--accent);
            color: #030303;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Oyun Matrisi */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            grid-template-rows: repeat(10, 32px);
            gap: 2px;
            background: #1f1f1f;
            padding: 3px;
            border: 1px solid var(--border-color);
        }

        /* Mayın Tarlası Hücreleri */
        .cell {
            width: 32px;
            height: 32px;
            background: #282828;
            border: 1px solid #1c1c1c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .cell:hover {
            background: #383838;
            color: #fff;
        }

        .cell.revealed {
            background: #050505;
            border: 1px solid #111;
            cursor: default;
        }

        /* Sayıların Siber Renk Skalası */
        .cell[data-count="1"] { color: #00e5ff; text-shadow: 0 0 5px rgba(0,229,255,0.3); }
        .cell[data-count="2"] { color: var(--accent); text-shadow: 0 0 5px rgba(0,255,65,0.3); }
        .cell[data-count="3"] { color: var(--pink-glitch); text-shadow: 0 0 5px rgba(255,0,193,0.3); }
        .cell[data-count="4"] { color: #ffea00; text-shadow: 0 0 5px rgba(255,234,0,0.3); }
        .cell[data-count="5"] { color: #ff9100; }
        
        .cell.mine {
            background: #ff0055 !important;
            color: #000 !important;
            font-size: 1.2rem;
        }
        
        .cell.flagged {
            color: var(--pink-glitch) !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-title">[ TERMINAL.EXE // SUBSYSTEM_MINESWEEPER ]</div>

    <div class="minesweeper-window">
        <div class="scoreboard">
            <div id="mine-count" class="digit-display">012</div>
            <button id="restart-btn" class="face-btn">:-)</button>
            <div id="timer" class="digit-display">000</div>
        </div>
        <div id="grid"></div>
    </div>

    <script>
        const rows = 10;
        const cols = 10;
        const minesCount = 12; // Mayın sayısı
        let grid = [];
        let gameOver = false;
        let timerInterval = null;
        let timeElapsed = 0;
        let timerStarted = false;

        const gridElement = document.getElementById('grid');
        const mineCountElement = document.getElementById('mine-count');
        const timerElement = document.getElementById('timer');
        const restartBtn = document.getElementById('restart-btn');

        function initGame() {
            gridElement.innerHTML = '';
            grid = [];
            gameOver = false;
            timeElapsed = 0;
            timerStarted = false;
            clearInterval(timerInterval);
            timerElement.innerText = "000";
            mineCountElement.innerText = String(minesCount).padStart(3, '0');
            restartBtn.innerText = ":-)";

            // 1. Oyun Tahtasını / Matrisi Oluştur
            for (let r = 0; r < rows; r++) {
                grid[r] = [];
                for (let c = 0; c < cols; c++) {
                    const cellElement = document.createElement('div');
                    cellElement.classList.add('cell');
                    
                    // Hücre etkileşimleri
                    cellElement.addEventListener('click', () => clickCell(r, c));
                    cellElement.addEventListener('contextmenu', (e) => {
                        e.preventDefault(); // Sağ tık menüsünü engelle
                        flagCell(r, c);
                    });

                    gridElement.appendChild(cellElement);
                    grid[r][c] = {
                        mine: false,
                        revealed: false,
                        flagged: false,
                        count: 0,
                        element: cellElement
                    };
                }
            }

            // 2. Mayınları Rastgele Dağıt
            let placedMines = 0;
            while (placedMines < minesCount) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                if (!grid[r][c].mine) {
                    grid[r][c].mine = true;
                    placedMines++;
                }
            }

            // 3. Komşu Mayın Sayılarını Hesapla (Matrix Yakınlık Algoritması)
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c].mine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (r + dr >= 0 && r + dr < rows && c + dc >= 0 && c + dc < cols) {
                                if (grid[r + dr][c + dc].mine) count++;
                            }
                        }
                    }
                    grid[r][c].count = count;
                }
            }
        }

        // Kronometreyi Başlat
        function startTimer() {
            timerStarted = true;
            timerInterval = setInterval(() => {
                timeElapsed++;
                timerElement.innerText = String(timeElapsed).padStart(3, '0');
                if (timeElapsed >= 999) clearInterval(timerInterval);
            }, 1000);
        }

        // Sol Tık - Hücre Açma Fonksiyonu
        function clickCell(r, c) {
            if (gameOver || grid[r][c].revealed || grid[r][c].flagged) return;
            if (!timerStarted) startTimer();

            const cell = grid[r][c];
            cell.revealed = true;
            cell.element.classList.add('revealed');

            // Mayına bastıysa patlat
            if (cell.mine) {
                endGame(false);
                return;
            }

            // Sayı varsa yazdır
            if (cell.count > 0) {
                cell.element.innerText = cell.count;
                cell.element.setAttribute('data-count', cell.count);
            } else {
                // Etrafta mayın yoksa komşuları otomatik aç (Flood Fill Algoritması)
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (r + dr >= 0 && r + dr < rows && c + dc >= 0 && c + dc < cols) {
                            clickCell(r + dr, c + dc);
                        }
                    }
                }
            }

            checkWin();
        }

        // Sağ Tık - Bayrak Koyma (P işareti)
        function flagCell(r, c) {
            if (gameOver || grid[r][c].revealed) return;
            const cell = grid[r][c];
            cell.flagged = !cell.flagged;
            
            if (cell.flagged) {
                cell.element.classList.add('flagged');
                cell.element.innerText = 'P'; // Siber bayrak sembolü
                // Kalan mayın sayacını düşür
                let currentCount = parseInt(mineCountElement.innerText);
                mineCountElement.innerText = String(Math.max(0, currentCount - 1)).padStart(3, '0');
            } else {
                cell.element.classList.remove('flagged');
                cell.element.innerText = '';
                // Sayacı geri arttır
                let currentCount = parseInt(mineCountElement.innerText);
                mineCountElement.innerText = String(currentCount + 1).padStart(3, '0');
            }
        }

        // Oyunu Sonlandır (Kazanma veya Kaybetme)
        function endGame(isWin) {
            gameOver = true;
            clearInterval(timerInterval);
            restartBtn.innerText = isWin ? "B-)" : "X-(";

            // Tüm gizli mayınları ifşa et
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c].mine) {
                        grid[r][c].element.classList.add('mine');
                        grid[r][c].element.innerText = 'X';
                    }
                }
            }
        }

        // Kazanma Durum Kontrolü
        function checkWin() {
            let win = true;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!grid[r][c].mine && !grid[r][c].revealed) win = false;
                }
            }
            if (win) endGame(true);
        }

        restartBtn.addEventListener('click', initGame);
        
        // İlk yüklemede motoru ateşle
        initGame();
    </script>
</body>
</html>
